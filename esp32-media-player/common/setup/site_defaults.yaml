# =============================================================================
# SITE DEFAULTS - Common settings across all devices
# =============================================================================
# Include this in each device's main build YAML to apply shared defaults.
# Values are set on every boot — change here to update all devices at once.
# =============================================================================
esphome:
  on_boot:
    priority: -200
    then:
      - lambda: |-
          // Clock
          id(clock_time_format).make_call().set_option("12 Hour").perform();
          id(clock_timezone).make_call().set_option("America/New_York (GMT-5)").perform();
          // Idle actions
          id(day_idle_action).make_call().set_option("Clock").perform();
          id(night_idle_action).make_call().set_option("Screen Off").perform();
          // Screen schedule hours (0-23)
          id(schedule_on_hour).make_call().set_value(6).perform();
          id(schedule_off_hour).make_call().set_value(21).perform();
          // Idle screen after 10 minutes (600 seconds)
          id(backlight_dim_timeout).make_call().set_value(600).perform();
          // Screen off after 30 minutes (1800 seconds)
          id(backlight_off_timeout).make_call().set_value(1800).perform();
          // Volume panel timeout (10 seconds)
          id(speaker_panel_timeout).make_call().set_value(10).perform();
          // Playback
          id(show_remaining_time).turn_on();
          id(show_progress_bar).turn_on();
          // Disable auto firmware update
          id(auto_update_switch).turn_off();
